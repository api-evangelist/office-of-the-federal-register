naftiko: 1.0.0-alpha2
info:
  label: Office of the Federal Register API
  description: 'Office of the Federal Register API. 13 operations. Lead operation: List Agencies. Self-contained Naftiko capability
    covering one Office Of The Federal Register business surface.'
  tags:
  - Office Of The Federal Register
  - Office of the Federal Register API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OFFICE_OF_THE_FEDERAL_REGISTER_API_KEY: OFFICE_OF_THE_FEDERAL_REGISTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: office-of-the-federal-register
    baseUri: https://www.federalregister.gov/api/v1
    description: Office of the Federal Register API business capability. Self-contained, no shared references.
    resources:
    - name: agencies
      path: /agencies
      operations:
      - name: listagencies
        method: GET
        description: List Agencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: agencies-slug
      path: /agencies/{slug}
      operations:
      - name: getagency
        method: GET
        description: Fetch a Single Agency
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: The agency slug.
          required: true
    - name: documents.json
      path: /documents.json
      operations:
      - name: searchdocuments
        method: GET
        description: Search Federal Register Documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: per_page
          in: query
          type: integer
          description: Number of results per page (max 1000).
        - name: page
          in: query
          type: integer
          description: Page number of results.
        - name: order
          in: query
          type: string
          description: Order of results (relevance, newest, oldest, executive_order_number).
        - name: conditions[term]
          in: query
          type: string
          description: Full text search term.
        - name: conditions[publication_date][gte]
          in: query
          type: string
          description: Publication date greater than or equal to (YYYY-MM-DD).
        - name: conditions[publication_date][lte]
          in: query
          type: string
          description: Publication date less than or equal to (YYYY-MM-DD).
        - name: conditions[type][]
          in: query
          type: string
          description: Document type (RULE, PRORULE, NOTICE, PRESDOCU).
        - name: conditions[agencies][]
          in: query
          type: string
          description: Agency slug filter.
    - name: documents-facets-facet
      path: /documents/facets/{facet}
      operations:
      - name: getdocumentfacets
        method: GET
        description: Document Counts By Facet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: facet
          in: path
          type: string
          description: Facet to aggregate by.
          required: true
    - name: documents-document_numbers}.json
      path: /documents/{document_numbers}.json
      operations:
      - name: getdocuments
        method: GET
        description: Fetch Multiple Documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: document_numbers
          in: path
          type: string
          description: Comma-separated document numbers.
          required: true
    - name: documents-document_number}.json
      path: /documents/{document_number}.json
      operations:
      - name: getdocument
        method: GET
        description: Fetch a Single Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: document_number
          in: path
          type: string
          description: The document number.
          required: true
    - name: images-identifier
      path: /images/{identifier}
      operations:
      - name: getimage
        method: GET
        description: Fetch a Single Image Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
    - name: issues-publication_date}.json
      path: /issues/{publication_date}.json
      operations:
      - name: getissue
        method: GET
        description: Fetch a Federal Register Issue Table of Contents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publication_date
          in: path
          type: string
          description: Publication date (YYYY-MM-DD).
          required: true
    - name: public-inspection-documents.json
      path: /public-inspection-documents.json
      operations:
      - name: searchpublicinspectiondocuments
        method: GET
        description: Search Public Inspection Documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: public-inspection-documents-current.json
      path: /public-inspection-documents/current.json
      operations:
      - name: getcurrentpublicinspectiondocuments
        method: GET
        description: Fetch Current Public Inspection Documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: public-inspection-documents-document_number}.json
      path: /public-inspection-documents/{document_number}.json
      operations:
      - name: getpublicinspectiondocument
        method: GET
        description: Fetch a Single Public Inspection Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: document_number
          in: path
          type: string
          required: true
    - name: suggested_searches
      path: /suggested_searches
      operations:
      - name: listsuggestedsearches
        method: GET
        description: List Suggested Searches
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: conditions[sections]
          in: query
          type: string
          description: Filter to a specific section.
    - name: suggested_searches-slug
      path: /suggested_searches/{slug}
      operations:
      - name: getsuggestedsearch
        method: GET
        description: Fetch a Single Suggested Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: office-of-the-federal-register-rest
    port: 8080
    description: REST adapter for Office of the Federal Register API. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/agencies
      name: agencies
      description: REST surface for agencies.
      operations:
      - method: GET
        name: listagencies
        description: List Agencies
        call: office-of-the-federal-register.listagencies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agencies/{slug}
      name: agencies-slug
      description: REST surface for agencies-slug.
      operations:
      - method: GET
        name: getagency
        description: Fetch a Single Agency
        call: office-of-the-federal-register.getagency
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/documents-json
      name: documents-json
      description: REST surface for documents.json.
      operations:
      - method: GET
        name: searchdocuments
        description: Search Federal Register Documents
        call: office-of-the-federal-register.searchdocuments
        with:
          per_page: rest.per_page
          page: rest.page
          order: rest.order
          conditions[term]: rest.conditions[term]
          conditions[publication_date][gte]: rest.conditions[publication_date][gte]
          conditions[publication_date][lte]: rest.conditions[publication_date][lte]
          conditions[type][]: rest.conditions[type][]
          conditions[agencies][]: rest.conditions[agencies][]
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/documents/facets/{facet}
      name: documents-facets-facet
      description: REST surface for documents-facets-facet.
      operations:
      - method: GET
        name: getdocumentfacets
        description: Document Counts By Facet
        call: office-of-the-federal-register.getdocumentfacets
        with:
          facet: rest.facet
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/documents/document-numbers-json
      name: documents-document-numbers-json
      description: REST surface for documents-document_numbers}.json.
      operations:
      - method: GET
        name: getdocuments
        description: Fetch Multiple Documents
        call: office-of-the-federal-register.getdocuments
        with:
          document_numbers: rest.document_numbers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/documents/document-number-json
      name: documents-document-number-json
      description: REST surface for documents-document_number}.json.
      operations:
      - method: GET
        name: getdocument
        description: Fetch a Single Document
        call: office-of-the-federal-register.getdocument
        with:
          document_number: rest.document_number
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/{identifier}
      name: images-identifier
      description: REST surface for images-identifier.
      operations:
      - method: GET
        name: getimage
        description: Fetch a Single Image Package
        call: office-of-the-federal-register.getimage
        with:
          identifier: rest.identifier
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issues/publication-date-json
      name: issues-publication-date-json
      description: REST surface for issues-publication_date}.json.
      operations:
      - method: GET
        name: getissue
        description: Fetch a Federal Register Issue Table of Contents
        call: office-of-the-federal-register.getissue
        with:
          publication_date: rest.publication_date
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/public-inspection-documents-json
      name: public-inspection-documents-json
      description: REST surface for public-inspection-documents.json.
      operations:
      - method: GET
        name: searchpublicinspectiondocuments
        description: Search Public Inspection Documents
        call: office-of-the-federal-register.searchpublicinspectiondocuments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/public-inspection-documents/current-json
      name: public-inspection-documents-current-json
      description: REST surface for public-inspection-documents-current.json.
      operations:
      - method: GET
        name: getcurrentpublicinspectiondocuments
        description: Fetch Current Public Inspection Documents
        call: office-of-the-federal-register.getcurrentpublicinspectiondocuments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/public-inspection-documents/document-number-json
      name: public-inspection-documents-document-number-json
      description: REST surface for public-inspection-documents-document_number}.json.
      operations:
      - method: GET
        name: getpublicinspectiondocument
        description: Fetch a Single Public Inspection Document
        call: office-of-the-federal-register.getpublicinspectiondocument
        with:
          document_number: rest.document_number
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suggested-searches
      name: suggested-searches
      description: REST surface for suggested_searches.
      operations:
      - method: GET
        name: listsuggestedsearches
        description: List Suggested Searches
        call: office-of-the-federal-register.listsuggestedsearches
        with:
          conditions[sections]: rest.conditions[sections]
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suggested-searches/{slug}
      name: suggested-searches-slug
      description: REST surface for suggested_searches-slug.
      operations:
      - method: GET
        name: getsuggestedsearch
        description: Fetch a Single Suggested Search
        call: office-of-the-federal-register.getsuggestedsearch
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: office-of-the-federal-register-mcp
    port: 9090
    transport: http
    description: MCP adapter for Office of the Federal Register API. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-agencies
      description: List Agencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: office-of-the-federal-register.listagencies
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-single-agency
      description: Fetch a Single Agency
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: office-of-the-federal-register.getagency
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: search-federal-register-documents
      description: Search Federal Register Documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: office-of-the-federal-register.searchdocuments
