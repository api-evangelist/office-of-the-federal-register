  - type: mcp
    port: 9090
    namespace: office-of-the-federal-register-mcp
    transport: http
    description: MCP adapter for Office of the Federal Register API for AI agent use.
    tools:
    - name: searchdocuments
      description: Search Federal Register Documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
