description: >-
  The Office of the Federal Register is responsible for publishing official government documents. This includes the
  publication of presidential proclamations, executive orders, and regulations from federal agencies. The office also
  compiles and publishes the Code of Federal Regulations, which contains all federal regulations currently in effect.
apis:
  - aid: office-of-the-federal-register:office-of-the-federal-register
    name: Office of the Federal Register
    description: >-
      Search, browse and learn about the Federal Register. Federal Register 2.0 is the unofficial daily publication for
      rules, proposed rules, and notices of Federal agencies and organizations, as well as executive orders and other
      presidential documents.
